<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>JS Playground - Grades Only</title>

</head>
<body>

<h1>🧪 lab1: ผลลัพธ์เกรด</h1>

<div id="output"></div>

<script>
// 1. ฟังก์ชัน getGrade ของคุณ
const getGrade = (score = 0) => {
  if (score >= 80) return "A";
  if (score >= 70) return "B";
  if (score >= 60) return "C";
  if (score >= 50) return "D";
  return "F";
};

// 2. รวบรวมเฉพาะผลลัพธ์เกรดที่ได้
const line1 = getGrade(85);
const line2 = getGrade(72);
const line3 = getGrade(44);
const line4 = getGrade();

const finalOutput = `${line1}\n${line2}\n${line3}\n${line4}`;

document.getElementById('output').innerText = finalOutput;
</script>

</body>
</html>
